<div class="container py-5">
     <!-- Botón Atrás -->
    <div class="mb-3">
        <button class="btn btn-light shadow-sm" (click)="volver()">
            <i class="fa fa-arrow-left me-2"></i> Atrás
        </button>
    </div>
    <!-- Título -->
    <h2 class="text-center fw-bold mb-4">Generar Hoja de Vida</h2>

    <!-- Subtítulo -->
    <p class="text-center text-secondary mb-3">Seleccionar Estudiante</p>

    <!-- Buscador -->
    <div class="d-flex justify-content-center mb-4">
        <div class="input-group w-50 shadow-sm">
            <span class="input-group-text">
                <i class="fa fa-id-card text-secondary"></i>
            </span>

            <input
                type="text"
                class="form-control border-start-0"
                placeholder="Ingrese código, identificación o nombre"
                [(ngModel)]="criterio"
            />

            <button class="btn btn-outline-secondary" (click)="buscar()">
                <i class="fa fa-search"></i>
            </button>
        </div>
    </div>

    <!-- Card principal -->
    <div class="card shadow-sm">
        <!-- Cargando -->
        <div *ngIf="cargando" class="text-center p-4">
            <div class="spinner-border text-secondary" role="status"></div>
        </div>

        <!-- Error -->
        <div *ngIf="error" class="alert alert-danger m-3 text-center">
            {{ error }}
        </div>

        <!-- Tabla -->
        <div
            class="table-responsive"
            *ngIf="!cargando && estudiantes.length > 0"
        >
            <table class="table table-bordered align-middle text-center mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Tipo de Documento</th>
                        <th>Documento</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Opciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr *ngFor="let estudiante of estudiantesPaginados">
                        <td>{{ estudiante.tipoIdentificacion }}</td>
                        <td>{{ estudiante.identificacion }}</td>
                        <td>{{ estudiante.nombre }}</td>
                        <td>{{ estudiante.apellido }}</td>
                        <td>
                            <button
                                class="btn btn-sm btn-primary"
                                (click)="seleccionarEstudiante(estudiante.codigo)"
                            >
                                <i class="fa fa-file-alt me-1"></i>
                                Ver Hoja de Vida
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- Paginación visual -->
            <nav class="mt-3" *ngIf="estudiantes.length > size">
                <ul class="pagination justify-content-center mb-3">
                    <li class="page-item" [class.disabled]="page === 0">
                        <button class="page-link" (click)="anterior()">
                            Anterior
                        </button>
                    </li>

                    <li class="page-item disabled">
                        <span class="page-link">
                            Página {{ page + 1 }}
                        </span>
                    </li>

                    <li
                        class="page-item"
                        [class.disabled]="(page + 1) * size >= estudiantes.length"
                    >
                        <button class="page-link" (click)="siguiente()">
                            Siguiente
                        </button>
                    </li>
                </ul>
            </nav>
        </div>

        <!-- Sin datos -->
        <div
            *ngIf="!cargando && estudiantes.length === 0 && !error"
            class="text-center p-4 text-secondary"
        >
            No hay estudiantes registrados
        </div>
    </div>
</div>
